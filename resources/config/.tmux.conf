# set default terminal to xterm
set -g default-terminal xterm-256color

# set mouse on with prefix m
bind m \
    set -g mouse on \;\
    display 'Mouse: ON'

# set mouse off with prefix M
bind M \
    set -g mouse off \;\
    display 'Mouse: OFF'

# set shortcut key for SSH
bind-key -n C-n new-window      "ssh xxx"
bind-key -n C-d split-window -h "ssh xxx"
bind-key -n C-s split-window -v "ssh xxx"

# Translate
set -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi j send -X cursor-left
bind -T copy-mode-vi i send -X cursor-up
bind -T copy-mode-vi k send -X cursor-down
bind -T copy-mode-vi l send -X cursor-right
bind -T copy-mode-vi I send -X -N 30 cursor-up
bind -T copy-mode-vi K send -X -N 30 cursor-down
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-on\; send -X begin-selection
bind -T copy-mode-vi Enter send -X copy-pipe translate.py

